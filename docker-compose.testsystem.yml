version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eventmanager}
      POSTGRES_USER: ${POSTGRES_USER:-eventmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventmanager} -d ${POSTGRES_DB:-eventmanager}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventmanager}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eventmanager}
      REDIS_URL: redis://redis:6379
      MAIL_TRANSPORT_URL: smtp://mailpit:1025
    ports:
      - "${API_PORT:-4000}:4000"

  seed-admin:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eventmanager}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eventmanager}
      REDIS_URL: redis://redis:6379
      MAIL_TRANSPORT_URL: smtp://mailpit:1025
    command: ["npm", "run", "seed", "-w", "@event-manager/api"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.test
    environment:
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
