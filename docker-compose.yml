services:
  postgres:
    image: postgres:16-alpine
    container_name: eventmanager-postgres
    environment:
      POSTGRES_DB: eventmanager
      POSTGRES_USER: eventmanager
      POSTGRES_PASSWORD: eventmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: eventmanager-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: eventmanager-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
